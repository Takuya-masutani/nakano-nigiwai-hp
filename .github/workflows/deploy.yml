name: Deploy to Xserver (SFTP)

on:
  push:
    branches:
      - main  # mainブランチへのpush時に自動デプロイ

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: SSH鍵を設定
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: lftp をインストール
        run: sudo apt-get install -y lftp

      - name: SFTPでデプロイ
        run: |
          lftp -c "
            set sftp:connect-program 'ssh -a -x -i $HOME/.ssh/id_ed25519 -p 10022 -o StrictHostKeyChecking=no';
            open sftp://xs329254@sv14176.xserver.jp;
            mirror --reverse --delete --verbose \
              --exclude-glob .git \
              --exclude-glob .github \
              --exclude desktop.ini \
              --exclude README.md \
              $GITHUB_WORKSPACE/themes/themes/Custom \
              /home/xs329254/nigiwaifesta.com/public_html/wp-content/themes/Custom;
            exit
          "
