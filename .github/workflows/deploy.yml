name: Deploy to Xserver (SSH)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: SSH秘密鍵を設定
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: known_hostsに追加
        run: |
          ssh-keyscan -p 10022 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: rsyncでデプロイ
        run: |
          rsync -avz --delete \
            -e "ssh -p 10022" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='desktop.ini' \
            --exclude='README.md' \
            themes/themes/Custom/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/xs329254/nigiwaifesta.com/public_html/wp-content/themes/Custom/
