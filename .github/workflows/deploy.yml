name: Deploy to Xserver (SSH)

on:
  push:
    branches:
      - main  # mainブランチへのpush時に自動デプロイ

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: SSH鍵を設定
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 10022 sv14176.xserver.jp >> ~/.ssh/known_hosts

      - name: rsyncでデプロイ
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='desktop.ini' \
            --exclude='README.md' \
            -e "ssh -p 10022 -i ~/.ssh/id_ed25519 -v -o StrictHostKeyChecking=no" \
            ./themes/themes/Custom/ \
            xs329254@sv14176.xserver.jp:/home/xs329254/nigiwaifesta.com/public_html/wp-content/themes/Custom/
